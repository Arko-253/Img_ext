services:
  - type: web
    name: picfin-backend
    env: docker
    plan: free
    dockerfilePath: server/Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGINS
        value: "*"
      - key: MAX_FILE_SIZE
        value: 104857600
      - key: NODE_OPTIONS
        value: --max-old-space-size=512