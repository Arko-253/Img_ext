<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./src/assets/favicon/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sekuya&family=Doto:wght@100..900&display=swap" rel="stylesheet">
    <title>PicFin</title>
  </head>
  <body>
    <div id="app"></div>
    <script>
      // Runtime configuration - detect API URL
      (async function() {
        try {
          // Try to get config from the server's /api/config endpoint
          const response = await fetch('/api/config', { method: 'GET' });
          if (response.ok) {
            const config = await response.json();
            window.VITE_API_URL = config.apiUrl || 'http://localhost:5000';
          } else {
            // Fallback to build-time env variable
            window.VITE_API_URL = import.meta.env.VITE_API_URL || 'http://localhost:5000';
          }
        } catch (err) {
          // Fallback: use build-time env or localhost
          window.VITE_API_URL = import.meta.env.VITE_API_URL || 'http://localhost:5000';
        }
        console.log('API URL set to:', window.VITE_API_URL);
      })();
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
