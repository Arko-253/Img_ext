services:
  - type: web
    name: picfin-backend
    env: node
    plan: free
    rootDir: server

    buildCommand: |
       curl -sSL https://install.python-poetry.org | python3 -
       export PATH="/opt/render/project/poetry/bin:$PATH"

        pyenv install 3.10.13
        pyenv global 3.10.13

        python3 -m pip install --upgrade pip
        python3 -m pip install -r ../ai/requirements.txt

        npm install

    startCommand: node server.js

    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGINS
        value: *
      - key: MAX_FILE_SIZE
        value: 104857600
      - key: NODE_OPTIONS
        value: --max-old-space-size=512