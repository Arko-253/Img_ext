services:
  - type: web
    name: picfin-backend
    env: node
    plan: free
    rootDir: server
    buildCommand: >-
      pip3.10 install --upgrade pip &&
      pip3.10 install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu &&
      pip3.10 install opencv-python-headless &&
      pip3.10 install -r ../ai/requirements.txt &&
      npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGINS
        value: "*"
      - key: MAX_FILE_SIZE
        value: 104857600
      - key: NODE_OPTIONS
        value: --max-old-space-size=512
